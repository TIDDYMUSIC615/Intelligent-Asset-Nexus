services:
  - type: web
    name: arsenal-sovereign-engine
    env: python
    plan: hobby
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: LAUNCH_LIVE
        value: "FALSE"
      - key: BASE_URL
        value: "https://arsenal-sovereign-engine.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: arsenal-postgres-db
          property: connectionString

databases:
  - name: arsenal-postgres-db
    plan: hobby